<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDENT REGISTRATION FORM</title>
    <style>
        form {
            width: 500px;
            /* adjust width as needed */
            margin: 50px auto;
            /* centers horizontally, 50px from top */
            background-color: #c14a4a;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        form:hover {
            background-color: #4CAF50;
        }



        h1 {
            text-align: center;
            color: white;
        }

        h1:hover {
            color: black;
        }

        label {
            color: white;
            font-weight: bold;
        }




        button {
            background-color: #1b35b7;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #653229;
        }

        input {

            width: 60%;
            padding: 10px;
            margin: 5px 0 15px 0;
            display: inline-block;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        input:hover {
            border-color: #1c38a8;
        }

        
    </style>
</head>

<body>
    <form action="" id="form" class="form">
        <h1>STUDENT REGISTRATION FORM</h1>



        <label for="name">Name:</label> <br>
        <input type="text" id="name" name="name" placeholder="Enter Your Name">


        <br>
        <label for="email">Email:</label>
        <br>
        <input type="email" id="email" name="email" placeholder="Enter Your Email">

        <br>
        <label for="fname">Father Name:</label>
        <br>
        <input type="text" id="fname" name="fname" placeholder="Enter Your Father Name">

        <br>
        <label for="age">Date of birth:</label>
        <br>
        <input type="date" id="age" name="age" placeholder="Enter Your Date of Birth">
        <br>
        <label for="skill">Skill:</label>
        <br>
        <input type="text" id="skill" name="skill" placeholder="Enter Your Skill">
        <br>
        <label for="gender">Gender:</label>
        <br>
        <input type="" id="gender" name="       gender" placeholder="Enter Your Gender">
        <br>
        <label for="username">Username:</label>
        <br>
        <input type="text" id="username" name="username" placeholder="Enter Your Username">
        <br><br>
        <label for="password">Password:</label>
        <br>
        <input type="password" id="password" name="password" placeholder="Enter Your Password">
        <br>

        <label for="pno">Contact Number:</label>
        <br>
        <input type="text" id="pno" name="pno" placeholder="Enter Your Phone Number">
        <br>
        <label for="address">Address:</label>
        <br>
        <input type="text" id="address" name="address" placeholder="Enter Your Address">
        <br>
        <label for="pic">Picture:</label>
        <br>
        <input type="file" id="pic" name="pic">
        <br>
        <label for="document">Document:</label>
        <br>
        <input type="file" id="document" name="document" multiple>
        <br><br>
        <button>
            Login
        </button>
        <button>
            Clear
        </button>




        </label>
    </form>
</body>

</html>
