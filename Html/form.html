<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDENT REGISTRATION FORM</title>
    <style>
        form {
            width: 500px;
            /* adjust width as needed */
            margin: 50px auto;
            /* centers horizontally, 50px from top */
            background-color: #c14a4a;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        form:hover {
            background-color: #4CAF50;
        }



        h1 {
            text-align: center;
            color: white;
        }

        h1:hover {
            color: black;
        }

        label {
            color: white;
            font-weight: bold;
        }

        input[type="submit"]:hover {
            background-color: #2a2cb5;
        }

        input[type="reset"] {
            background-color: #f44336;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        input[type="reset"]:hover {
            background-color: #d32f2f;
        }
    </style>
</head>

<body>
    <form action="" id="form" class="form">
        <h1>STUDENT REGISTRATION FORM</h1>


        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter Your Name">
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter Your Email">
        </div>

        <label for="fname">Father Name:</label>
        <input type="text" id="fname" name="fname" placeholder="Enter Your Father Name">
        <br><br>
        <label for="age">Date of birth:</label>
        <input type="date" id="age" name="age" placeholder="Enter Your Date of Birth">
        <br><br>
        <label for="skill">Skill:</label>
        <input type="text" id="skill" name="skill" placeholder="Enter Your Skill">
        <br><br>
        <label for="gender">Gender:</label>
        <input type="text" id="gender" name="       gender" placeholder="Enter Your Gender">
        <br><br>
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" placeholder="Enter Your Username">
        <br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter Your Password">
        <br><br>

        <label for="pno">Contact Number:</label>
        <input type="text" id="pno" name="pno" placeholder="Enter Your Phone Number">
        <br><br>
        <label for="address">Address:</label>
        <input type="text" id="address" name="address" placeholder="Enter Your Address">
        <br><br>
        <label for="pic">Picture:</label>
        <input type="file" id="pic" name="pic">
        <br><br>
        <label for="document">Document:</label>
        <input type="file" id="document" name="document">
        <br><br>
        <input type="reset" value="Reset">
        <input type="submit" value="Submit">
        <input type="button" value="Clear">



        </label>
    </form>
</body>

</html>
